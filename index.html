<!DOCTYPE html>
<html>
<head>
  <title>Momentum Padel Dashboard</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.2/dist/semantic.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="ui container">

  <div class="ui segment header-bar">
    <img src="logo.png" class="logo">
    <h2>Momentum Padel Dashboard</h2>
  </div>

  <div class="ui grid">
    <div class="eight wide column">
      <select id="playerSelect" class="ui dropdown"></select>
    </div>
    <div class="eight wide column right aligned">
      <a id="reportLink" class="ui primary button">View Report</a>
    </div>
  </div>

  <div class="ui four column grid" id="kpiGrid"></div>

  <div class="ui grid">
    <div class="eight wide column">
      <canvas id="shotChart"></canvas>
    </div>
    <div class="eight wide column">
      <canvas id="errorChart"></canvas>
    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
